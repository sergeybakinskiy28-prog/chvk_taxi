version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: chvk_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chvk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chvk_secret}
      POSTGRES_DB: ${POSTGRES_DB:-taxi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chvk} -d ${POSTGRES_DB:-taxi}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: chvk_api
    command: uvicorn chvk_city.backend.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chvk}:${POSTGRES_PASSWORD:-chvk_secret}@db:5432/${POSTGRES_DB:-taxi}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: chvk_bot
    command: python -m chvk_city.bot.telegram.bot
    environment:
      API_BASE_URL: http://api:8000
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-chvk}:${POSTGRES_PASSWORD:-chvk_secret}@db:5432/${POSTGRES_DB:-taxi}
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: chvk_network
